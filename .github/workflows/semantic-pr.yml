# Enforces Conventional Commit PR titles. All merges to main are squash
# merges, so the PR title becomes the commit message on main — which is what
# release-please reads to compute the next version and changelog.
name: Semantic PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # feat -> minor, fix -> patch, feat!/fix! (breaking) -> major.
          # Everything else ships with the next release but doesn't bump on its own.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
